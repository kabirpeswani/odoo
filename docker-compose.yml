services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 3s
      timeout: 3s
      retries: 20

  odoo:
    image: odoo:17
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      # The repo root is the addons directory: it contains assetflow/.
      - ./:/mnt/extra-addons:ro
      - odoo-data:/var/lib/odoo
    # -i assetflow creates the database and installs the module on first run.
    # On later runs the module is already installed and this is a no-op, so the
    # same command works for both `up` and every restart after it.
    command: >
      odoo
      --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
      --database=assetflow
      --db_host=db --db_user=odoo --db_password=odoo
      --db-filter=^assetflow$$
      --without-demo=all
      -i assetflow

volumes:
  pgdata:
  odoo-data:
